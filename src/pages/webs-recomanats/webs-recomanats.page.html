<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Webs recomanats</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div *ngIf="!selectedUrl">
    <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
    <p *ngIf="!errorMessage && lista.length === 0">Cargando webs recomendadas...</p>

    <ion-card *ngFor="let datos of lista" class="custom-card">
      <ion-card-content>
        <img [src]="'http://bioaps.uv.es/site/assets/files/' + datos.id + '/' + datos.imatge" alt="Web Image" />
        <p class="description">{{ datos.descripcio }}</p>
        <a [href]="datos.enllac" target="_blank" class="enllac">{{ datos.enllac }}</a>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
